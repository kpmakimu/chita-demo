<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - CHITA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-dark: #071013;       
      --c-primary: #456990;    /* Steel Blue (75% Framework) */
      --c-accent: #fa8c3f;     /* Safety Orange (Brand Accent) */
      --c-light: #eaf6ff;      
      --c-border: #dfe0e2;     
      --bg-main: var(--c-light);
      --text-muted: #5c6466;   
      --radius-md: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: var(--c-dark);
      -webkit-font-smoothing: antialiased;
    }

    .login-split {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      min-height: 100vh;
      animation: fadeIn 0.3s ease;
    }

    .login-visual {
      background: var(--c-primary); 
      padding: 80px;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-visual h2 {
      color: var(--c-accent);
      font-size: 36px;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    .login-form-area {
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1.5px solid var(--c-border);
      border-radius: var(--radius-md);
      margin-bottom: 12px;
      outline: none;
      transition: 0.2s;
      font-family: inherit;
      color: var(--c-dark);
    }

    input:focus {
      border-color: var(--c-accent); 
      box-shadow: 0 0 0 3px rgba(250, 140, 63, 0.15);
    }

    .btn {
      padding: 14px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .btn-p {
      background: var(--c-primary); 
      color: white;
    }

    .btn-p:hover {
      background: var(--c-accent); 
      box-shadow: 0 4px 12px rgba(250, 140, 63, 0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .login-split {
        grid-template-columns: 1fr; 
        grid-template-rows: auto 1fr; 
      }

      .login-visual {
        padding: 40px 24px; 
        text-align: center;
        justify-content: center;
        align-items: center;
      }

      .login-visual h2 {
        font-size: 24px !important; 
        margin-bottom: 8px !important;
      }

      .login-visual p {
        font-size: 14px !important;
      }

      .login-form-area {
        padding: 40px 24px;
        align-items: flex-start; 
      }

      .login-box {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="login-split">
    <div class="login-visual">
      <h2>CHITA Procurement and Supply Chain Portal</h2>
      <p style="font-size:18px; opacity:0.8; line-height:1.6; font-weight: 500;"><i>Authorized Personnel Only</i></p>
    </div>
    
    <div class="login-form-area">
      <div class="login-box" style="display: flex; flex-direction: column; align-items: flex-start;">
        <img src="assets/Child-Help-Logo.png" alt="Logo" style="height: 54px; margin-bottom: 32px; width: auto;">
        
        <div style="width: 24px; height: 4px; background: var(--c-accent); margin-bottom: 8px; border-radius: 2px;"></div>
        <h3 style="font-size:24px; margin-bottom:32px; color:var(--c-dark); font-weight:800;">Sign In</h3>

        <input type="email" placeholder="Email Address" value="admin@mbuyunihosp.co.tz">
        <input type="password" placeholder="Password" value="••••••••">

        <a href="../home/home.html" class="btn btn-p" style="width:100%; margin-bottom: 20px;">Enter Platform</a>

        <div style="width: 100%; text-align: center; font-size: 13px; color: var(--text-muted);">
          Don't have an account?
          <a href="auth/register.html" style="color: var(--c-accent); font-weight: 700; text-decoration: underline; text-underline-offset: 4px;">
            Register here
          </a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
